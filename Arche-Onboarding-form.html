<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Employee by UID</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f0f2f5;
      --nav-bg: #111214;
      --nav-height: 64px;
      --card-bg: #ffffff;
      --border: #e4e7ec;
      --text-primary: #111214;
      --text-secondary: #6b7280;
      --accent: #e8470a;
      --accent-hover: #c93d08;
      --radius: 16px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: var(--nav-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-logo img {
      height: 56px;
      width: auto;
      display: block;
      mix-blend-mode: screen;
    }

    /* ── PAGE BODY ── */
    .page-body {
      min-height: 100vh;
      padding-top: calc(var(--nav-height) + 48px);
      padding-bottom: 48px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* ── CARD ── */
    .form-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 480px;
      margin: 0 20px;
      overflow: hidden;
      animation: cardIn .5s cubic-bezier(.22,.68,0,1.2) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── CARD HEADER ── */
    .form-header {
      padding: 36px 36px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-icon {
      width: 52px;
      height: 52px;
      background: #fff5f0;
      border: 1.5px solid #ffd5c2;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 26px;
      height: 26px;
      stroke: var(--accent);
    }

    .header-text h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.4px;
    }

    .header-text p {
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    /* ── CARD BODY ── */
    .form-content {
      padding: 32px 36px 36px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.3px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    .input-prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-secondary);
      pointer-events: none;
      user-select: none;
    }

    input {
      width: 100%;
      padding: 13px 14px 13px 38px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14.5px;
      font-family: var(--mono);
      font-weight: 500;
      color: var(--text-primary);
      background: #fafafa;
      transition: border-color .2s, box-shadow .2s, background .2s;
      letter-spacing: 0.5px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(232,71,10,0.12);
    }

    input:hover:not(:focus) {
      border-color: #c4c9d4;
      background: #fff;
    }

    input.error {
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220,38,38,0.1);
    }

    .error-message {
      color: #dc2626;
      font-size: 12px;
      margin-top: 6px;
      display: none;
      align-items: center;
      gap: 5px;
    }

    .error-message.show { display: flex; }

    /* ── STATUS ── */
    .msg {
      text-align: center;
      margin-top: 14px;
      font-size: 13.5px;
      font-weight: 500;
      min-height: 20px;
    }

    .msg.success { color: #16a34a; }
    .msg.error   { color: #dc2626; }
    .msg.info    { color: #2563eb; }

    /* ── BUTTON ── */
    .button-group {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      letter-spacing: 0.2px;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(232,71,10,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button[type="submit"]:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(232,71,10,0.38);
    }

    button[type="submit"]:active { transform: translateY(0); }

    button[type="submit"]:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    button[type="submit"] svg {
      width: 16px;
      height: 16px;
      stroke: #fff;
      flex-shrink: 0;
    }

    /* ── RESULT VIEW ── */
    #resultView {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: var(--bg);
      overflow: auto;
      padding: 80px 40px 40px;
      z-index: 9999;
    }

    #resultView.visible { display: block; }

    .back-btn {
      position: fixed;
      top: 76px;
      left: 24px;
      padding: 9px 18px;
      background: var(--nav-bg);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-btn:hover { background: #222427; }

    #resultView pre {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      white-space: pre-wrap;
      font-size: 14px;
      font-family: var(--mono);
      line-height: 1.7;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    @media (max-width: 600px) {
      .form-header, .form-content { padding: 24px 22px; }
    }
  </style>
</head>
<body>

    <div class="nav-logo">

    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="page-body">
    <div class="form-container" id="searchContainer">

      <div class="form-header">
        <div class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>Search Employee</h1>
          <p>Enter a Unique ID to load employee details</p>
        </div>
      </div>

      <form id="uidSearchForm">
        <div class="form-content">
          <div class="form-group">
            <label>Unique ID <span style="color:var(--accent);">*</span></label>
            <div class="input-wrap">
              <span class="input-prefix">#</span>
              <input type="text" id="uniqueID" name="uniqueID" placeholder="EMP001" required style="text-transform:uppercase;">
            </div>
            <span class="error-message" id="uniqueID-error">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Enter a valid UID
            </span>
          </div>

          <div class="msg" id="statusMsg"></div>

          <div class="button-group">
            <button type="submit" id="submitBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
              </svg>
              <span>Search Employee</span>
            </button>
          </div>
        </div>
      </form>

    </div>
  </div>

  <!-- RESULT VIEW -->
  <div id="resultView">
    <button class="back-btn" onclick="goBack()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back
    </button>
    <div id="resultContent"></div>
  </div>

  <script>
    // === UPDATE THIS URL TO YOUR n8n GET WEBHOOK ===
    const N8N_GET_WEBHOOK = "https://n8nhost771.app.n8n.cloud/webhook/fetch-by-id";

    const form = document.getElementById('uidSearchForm');
    const uidIn = document.getElementById('uniqueID');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('statusMsg');
    const err = document.getElementById('uniqueID-error');
    const searchContainer = document.getElementById('searchContainer');
    const resultView = document.getElementById('resultView');
    const resultContent = document.getElementById('resultContent');

    // Force uppercase
    uidIn.addEventListener('input', e => e.target.value = e.target.value.toUpperCase());

    // Go back
    window.goBack = () => {
      resultView.classList.remove('visible');
      searchContainer.style.display = 'block';
      sessionStorage.removeItem('searchResult');
      history.replaceState(null, '', window.location.pathname);
    };

    // Submit → GET request
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const uid = uidIn.value.trim();
      if (!uid) {
        showError('Please enter Unique ID');
        return;
      }

      showStatus('Searching...', 'info');
      btn.disabled = true;

      const url = `${N8N_GET_WEBHOOK}?uniqueID=${encodeURIComponent(uid)}`;

      try {
        const res = await fetch(url, {
          method: 'GET',
          headers: { 'Accept': 'application/json, text/html' }
        });

        const contentType = (res.headers.get('content-type') || '').toLowerCase();
        const rawText = await res.text();

        if (!res.ok) {
          throw new Error(extractError(rawText, contentType) || `HTTP ${res.status}`);
        }

        if (contentType.includes('application/json')) {
          let data;
          try { data = JSON.parse(rawText); } catch { throw new Error('Employee data not found'); }

          if (!data.found && data.found !== undefined) {
            throw new Error('Employee not found');
          }

          showStatus('Employee found! Loading form...', 'success');
          setTimeout(() => {
            const params = new URLSearchParams(data).toString();
            window.location.href = `employee-form.html?${params}`;
          }, 800);
          return;
        }

        if (contentType.includes('text/html')) {
          sessionStorage.setItem('searchResult', JSON.stringify({ uid, rawText, isHtml: true }));
          const newTab = window.open(url, '_blank');
          if (newTab) {
            showStatus('Opening result in new tab...', 'success');
          } else {
            alert('Please allow popups for this site');
          }
          return;
        }

        sessionStorage.setItem('searchResult', JSON.stringify({ uid, rawText, isHtml: false }));
        showResult(uid, rawText, false);

      } catch (error) {
        showError(error.message);
      } finally {
        btn.disabled = false;
      }
    });

    function showResult(uid, rawText, isHtml) {
      searchContainer.style.display = 'none';
      resultView.classList.add('visible');
      resultContent.innerHTML = isHtml
        ? `<iframe src="data:text/html;charset=utf-8,${encodeURIComponent(rawText)}" style="width:100%;height:90vh;border:none;border-radius:12px;"></iframe>`
        : `<h2 style="margin-bottom:16px;font-size:18px;">Result for: ${uid}</h2><pre>${escapeHtml(rawText)}</pre>`;
    }

    window.addEventListener('load', () => {
      const stored = sessionStorage.getItem('searchResult');
      if (stored) {
        const { uid, rawText, isHtml } = JSON.parse(stored);
        showResult(uid, rawText, isHtml);
      }
    });

    function showError(text) {
      err.querySelector('svg') && (err.querySelector('svg').nextSibling.textContent = ' ' + text);
      err.lastChild.textContent = text;
      err.classList.add('show');
      uidIn.classList.add('error');
      msg.textContent = '';
    }
    function showStatus(text, type) {
      msg.textContent = text;
      msg.className = 'msg ' + type;
      err.classList.remove('show');
      uidIn.classList.remove('error');
    }
    function extractError(text, ctype) {
      if (ctype.includes('json')) {
        try {
          const j = JSON.parse(text);
          return j.message || j.error || j.detail || text;
        } catch {}
      }
      const match = text.match(/<pre>([\s\S]*?)<\/pre>/i);
      return match ? match[1].trim() : text.trim();
    }
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
