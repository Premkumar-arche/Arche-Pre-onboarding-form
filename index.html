<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arche Global | Onboarding Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #e8470a; --bg-color: #f4f7f6; --text-dark: #111214; --text-light: #475467; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 5px solid var(--primary-color); }
        h2 { color: var(--text-dark); margin-bottom: 25px; text-align: center; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: var(--text-light); font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid #d0d5dd; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 4px rgba(232, 71, 10, 0.1); }
        button { width: 100%; background-color: var(--primary-color); color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #cf3d08; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; text-align: center; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>Candidate Onboarding</h2>
    
    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="candidate_name" placeholder="Prem Kumar" required>
    </div>

    <div class="form-group">
        <label>Employee ID</label>
        <input type="text" id="emp_id" placeholder="AG1504" required>
    </div>

    <div class="form-group">
        <label>Department</label>
        <input type="text" id="dept_name" placeholder="Automation Engine">
    </div>

    <button id="submitBtn" onclick="triggerOnboarding()">Initiate Workflow</button>
    <div id="status"></div>
</div>

<script>
    async function triggerOnboarding() {
        const statusDiv = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');
        
        // --- VERIFIED PRODUCTION PARAMETERS ---
        const projectId = 1; 
        const templateId = 22; 
        const apiToken = 'e4nd-rj-ldwzndvh8veryxlmjzj87dba-tjoxpky8ya=';
        
        // Use the EXACT endpoint that worked in PowerShell
        const semaphoreUrl = `https://automation.arche.global/api/project/${projectId}/tasks`;

        const data = {
            name: document.getElementById('candidate_name').value.trim(),
            id: document.getElementById('emp_id').value.trim(),
            dept: document.getElementById('dept_name').value.trim()
        };

        if (!data.name || !data.id) {
            statusDiv.innerText = "✖ Name and ID are mandatory.";
            statusDiv.style.color = "red";
            return;
        }

        statusDiv.innerText = "⏳ Deploying to Arche Global Cloud...";
        statusDiv.style.color = "#475467";
        submitBtn.disabled = true;

        try {
            const response = await fetch(semaphoreUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiToken}`
                },
                body: JSON.stringify({
                    "template_id": templateId,
                    "environment_variables": {
                        "CANDIDATE_NAME": data.name,
                        "EMP_ID": data.id,
                        "DEPT_NAME": data.dept
                    }
                })
            });

            if (response.ok) {
                const result = await response.json();
                statusDiv.innerText = `✔ Success! Created Task #${result.id}`;
                statusDiv.style.color = "green";
                // Clear the form
                document.querySelectorAll('input').forEach(i => i.value = '');
            } else {
                const errorText = await response.text();
                statusDiv.innerText = `✖ API Rejection (${response.status})`;
                statusDiv.style.color = "red";
                console.error("Semaphore Error:", errorText);
            }
        } catch (error) {
            statusDiv.innerText = "✖ CORS Error. Please enable your CORS Extension!";
            statusDiv.style.color = "red";
            console.error("Fetch Error:", error);
        } finally {
            submitBtn.disabled = false;
        }
    }
</script>

</body>
</html>
