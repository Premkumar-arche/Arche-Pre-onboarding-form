<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arche Global | Onboarding Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 5px solid #e8470a; }
        h2 { color: #111214; margin-bottom: 25px; text-align: center; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: #475467; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid #d0d5dd; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: #e8470a; outline: none; box-shadow: 0 0 0 4px rgba(232, 71, 10, 0.1); }
        button { width: 100%; background-color: #e8470a; color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #cf3d08; }
        #status { margin-top: 20px; font-size: 14px; text-align: center; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Candidate Onboarding</h2>
    
    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="candidate_name" placeholder="John Doe">
    </div>

    <div class="form-group">
        <label>Employee ID</label>
        <input type="text" id="emp_id" placeholder="AG-2026-XXXX">
    </div>

    <div class="form-group">
        <label>Department</label>
        <input type="text" id="dept_name" placeholder="Infrastructure">
    </div>

    <button onclick="triggerOnboarding()">Initiate Workflow</button>
    <div id="status"></div>
</div>

<script>
    async function triggerOnboarding() {
        const statusDiv = document.getElementById('status');
        
        // Finalized Configuration from your URL
        const projectId = 2; 
        const templateId = 1; 
        const apiToken = 'nzeb2gyge37imfhtnziayrgot77wfg5cmcf2qdselug=';

        const data = {
            name: document.getElementById('candidate_name').value,
            id: document.getElementById('emp_id').value,
            dept: document.getElementById('dept_name').value
        };

        if (!data.name || !data.id) {
            statusDiv.innerText = "Please fill in mandatory fields.";
            statusDiv.style.color = "red";
            return;
        }

        statusDiv.innerText = "Connecting to Semaphore...";
        statusDiv.style.color = "#475467";

        try {
            const response = await fetch(`http://127.0.0.1:3001/api/v1/project/2/templates/1/tasks`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiToken}`
                },
                body: JSON.stringify({
                    "template_id": templateId,
                    "environment_variables": {
                        "CANDIDATE_NAME": data.name,
                        "EMP_ID": data.id,
                        "DEPT_NAME": data.dept
                    }
                })
            });

            if (response.ok) {
                statusDiv.innerText = "✔ Success! Automation triggered.";
                statusDiv.style.color = "green";
            } else {
                const errorData = await response.text();
                statusDiv.innerText = "✖ Failed: " + response.status;
                statusDiv.style.color = "red";
                console.error("Semaphore Error:", errorData);
            }
        } catch (error) {
            statusDiv.innerText = "✖ Network Error. Is Semaphore running?";
            statusDiv.style.color = "red";
            console.error("Fetch Error:", error);
        }
    }
</script>

</body>
</html>
